<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book an Appointment | Darzi Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared-styles.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">Darzi</a>
        <nav class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="work.html" class="nav-link">Our Work</a>
            <a href="book.html" class="nav-link active">Book Now</a>
            <a href="track.html" class="nav-link">Track Order</a>
        </nav>
        <div class="user-menu">
            <span id="display-name" style="font-size: 0.8rem; color: var(--primary);"></span>
            <button class="btn-logout" id="logout-btn">Logout</button>
        </div>
    </header>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </a>
        <a href="work.html" class="bottom-nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
            <span>Work</span>
        </a>
        <a href="book.html" class="bottom-nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            <span>Book</span>
        </a>
        <a href="track.html" class="bottom-nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>Track</span>
        </a>
    </nav>

    <main>
        <div class="container">
            <h2>Book Your Masterpiece</h2>
            <form id="order-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="order-name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="order-phone" placeholder="10-digit mobile number" 
                        inputmode="numeric" maxlength="10" pattern="[0-9]{10}" 
                        oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                        title="Please enter a 10-digit phone number" required>
                </div>
                <div class="form-group">
                    <label>Delivery Address</label>
                    <textarea id="order-address" rows="2" placeholder="Where should we deliver?" required></textarea>
                </div>
                <div class="form-group">
                    <label>Apparel Type</label>
                    <select id="order-type">
                        <option>Three-Piece Suit</option>
                        <option>Custom Shirt</option>
                        <option>Sherwani</option>
                        <option>Bespoke Trousers</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Approx. Measurements (e.g., Chest: 40, Waist: 34)</label>
                    <textarea id="order-measurements" rows="2" placeholder="Leave empty if you'll visit the shop"></textarea>
                </div>
                <div class="form-group">
                    <label>Preferred Delivery Date</label>
                    <input type="date" id="order-date" required>
                </div>
                <button type="submit" class="btn-primary">Confirm Appointment</button>
            </form>
        </div>
    </main>

    <div id="success-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:5000; justify-content:center; align-items:center; color:white; text-align:center; padding:2rem;">
        <div>
            <div style="font-size: 4rem; color: var(--primary); margin-bottom: 1rem;">✓</div>
            <h2 style="color:white;">Order Placed Successfully!</h2>
            <p>Our master tailor will review your requirements.</p>
            <button onclick="window.location.href='track.html'" class="btn-primary" style="margin-top:2rem;">Track Your Order</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsZ6HuUOeC-zvTfOU-9f0f0P3xHmrfiAc",
            authDomain: "tailor5.firebaseapp.com",
            projectId: "tailor5",
            storageBucket: "tailor5.firebasestorage.app",
            messagingSenderId: "939975173681",
            appId: "1:939975173681:web:cea8391698c23ac6d79710",
            databaseURL: "https://tailor5-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const logoutBtn = document.getElementById('logout-btn');
        const displayName = document.getElementById('display-name');
        let currentUser = null;

        // Auth Logic
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                logoutBtn.style.display = 'block';
                displayName.innerText = (user.displayName || user.email.split('@')[0]);
            } else {
                window.location.href = "index.html"; // Redirect if not logged in
            }
        });

        document.getElementById('order-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            const orderData = {
                userId: currentUser.uid,
                name: document.getElementById('order-name').value,
                phone: document.getElementById('order-phone').value,
                address: document.getElementById('order-address').value,
                type: document.getElementById('order-type').value,
                measurements: document.getElementById('order-measurements').value,
                deliveryDate: document.getElementById('order-date').value,
                status: "Pending",
                timestamp: serverTimestamp()
            };
            try {
                const ordersRef = ref(db, 'orders');
                const newOrderRef = push(ordersRef);
                await set(newOrderRef, orderData);
                document.getElementById('success-overlay').style.display = 'flex';
            } catch (error) { alert(error.message); }
        });

        logoutBtn.addEventListener('click', () => signOut(auth).then(() => window.location.href = "index.html"));
    </script>
</body>
</html>
