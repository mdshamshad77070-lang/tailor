<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Masterpieces | Darzi Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared-styles.css">
    <style>
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem;
            padding: 2rem 0;
        }
        .work-card {
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: 0.4s;
            border: 1px solid var(--glass-border);
        }
        .work-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(197, 160, 89, 0.15); }
        .work-card img { width: 100%; height: 280px; object-fit: cover; }
        .work-info { padding: 1.5rem; }
        .work-info h4 { font-family: var(--font-heading); font-size: 1.25rem; margin-bottom: 0.5rem; color: var(--accent); }
        .work-info p { font-size: 0.9rem; color: var(--text-dim); line-height: 1.6; }
        .price-tag { color: var(--primary); font-weight: 700; margin: 10px 0; font-size: 1.1rem; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Darzi</a>
        <nav class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="work.html" class="nav-link active">Our Work</a>
            <a href="book.html" class="nav-link nav-protected">Book Now</a>
            <a href="track.html" class="nav-link nav-protected">Track Order</a>
        </nav>
        <div class="user-menu">
            <span id="display-name" style="font-size: 0.8rem; color: var(--primary);"></span>
            <button class="btn-logout" id="logout-btn">Logout</button>
        </div>
    </header>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </a>
        <a href="work.html" class="bottom-nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
            <span>Work</span>
        </a>
        <a href="book.html" class="bottom-nav-item nav-protected">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            <span>Book</span>
        </a>
        <a href="track.html" class="bottom-nav-item nav-protected">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>Track</span>
        </a>
    </nav>

    <main>
        <h2 style="text-align: center;">Our Masterpieces</h2>
        <div class="portfolio-grid" id="portfolio-display">
            <div style="text-align:center; color: var(--text-dim); grid-column: 1/-1;">Loading designs...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsZ6HuUOeC-zvTfOU-9f0f0P3xHmrfiAc",
            authDomain: "tailor5.firebaseapp.com",
            projectId: "tailor5",
            storageBucket: "tailor5.firebasestorage.app",
            messagingSenderId: "939975173681",
            appId: "1:939975173681:web:cea8391698c23ac6d79710",
            databaseURL: "https://tailor5-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const logoutBtn = document.getElementById('logout-btn');
        const displayName = document.getElementById('display-name');
        const portfolioDisplay = document.getElementById('portfolio-display');

        // Load Portfolio
        onValue(ref(db, 'portfolio'), (snapshot) => {
            const data = snapshot.val();
            portfolioDisplay.innerHTML = '';
            if (!data) {
                portfolioDisplay.innerHTML = '<div style="text-align:center; color: var(--text-dim); grid-column: 1/-1;">No designs yet.</div>';
                return;
            }
            Object.values(data).reverse().forEach(item => {
                portfolioDisplay.innerHTML += `
                    <div class="work-card">
                        <img src="${item.image}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/400x250?text=Premium+Design'">
                        <div class="work-info">
                            <h4>${item.title}</h4>
                            <p class="price-tag">Starting from ₹${item.price || '0'}</p>
                            <p>${item.desc}</p>
                        </div>
                    </div>
                `;
            });
        });

        // Auth Logic
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.querySelectorAll('.nav-protected').forEach(el => el.style.display = 'block');
                logoutBtn.style.display = 'block';
                displayName.innerText = (user.displayName || user.email.split('@')[0]);
            } else {
                document.querySelectorAll('.nav-protected').forEach(el => el.style.display = 'none');
                logoutBtn.style.display = 'none';
                displayName.innerText = '';
            }
        });

        logoutBtn.addEventListener('click', () => signOut(auth).then(() => window.location.href = "index.html"));
    </script>
</body>
</html>
