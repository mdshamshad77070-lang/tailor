<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Orders | Darzi Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared-styles.css">
    <style>
        .order-card {
            background: #ffffff;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .order-info h4 { font-family: var(--font-heading); font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--accent); }
        .order-info p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 4px; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Darzi</a>
        <nav class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="work.html" class="nav-link">Our Work</a>
            <a href="book.html" class="nav-link">Book Now</a>
            <a href="track.html" class="nav-link active">Track Order</a>
        </nav>
        <div class="user-menu">
            <span id="display-name" style="font-size: 0.8rem; color: var(--primary);"></span>
            <button class="btn-logout" id="logout-btn">Logout</button>
        </div>
    </header>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </a>
        <a href="work.html" class="bottom-nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
            <span>Work</span>
        </a>
        <a href="book.html" class="bottom-nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            <span>Book</span>
        </a>
        <a href="track.html" class="bottom-nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>Track</span>
        </a>
    </nav>

    <main>
        <h2 style="text-align: center;">Your Order History</h2>
        <div id="user-orders-list">
            <div style="text-align:center; color: var(--text-dim);">Loading your orders...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsZ6HuUOeC-zvTfOU-9f0f0P3xHmrfiAc",
            authDomain: "tailor5.firebaseapp.com",
            projectId: "tailor5",
            storageBucket: "tailor5.firebasestorage.app",
            messagingSenderId: "939975173681",
            appId: "1:939975173681:web:cea8391698c23ac6d79710",
            databaseURL: "https://tailor5-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const logoutBtn = document.getElementById('logout-btn');
        const displayName = document.getElementById('display-name');
        const userOrdersList = document.getElementById('user-orders-list');
        let currentUser = null;

        // Auth Logic
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                logoutBtn.style.display = 'block';
                displayName.innerText = (user.displayName || user.email.split('@')[0]);
                loadUserOrders();
            } else {
                window.location.href = "index.html";
            }
        });

        function loadUserOrders() {
            if (!currentUser) return;
            onValue(ref(db, 'orders'), (snapshot) => {
                const data = snapshot.val();
                userOrdersList.innerHTML = '';
                if (!data) {
                    userOrdersList.innerHTML = '<div style="text-align:center; color: var(--text-dim);">No orders found.</div>';
                    return;
                }
                const myOrders = Object.entries(data)
                    .map(([id, val]) => ({ id, ...val }))
                    .filter(order => order.userId === currentUser.uid)
                    .sort((a, b) => b.timestamp - a.timestamp);

                if (myOrders.length === 0) {
                    userOrdersList.innerHTML = '<div style="text-align:center; color: var(--text-dim);">You haven\'t placed any orders yet.</div>';
                    return;
                }

                myOrders.forEach(order => {
                    const date = order.timestamp ? new Date(order.timestamp).toLocaleDateString() : 'N/A';
                    userOrdersList.innerHTML += `
                        <div class="order-card">
                            <div class="order-info">
                                <h4>${order.type}</h4>
                                <p>Placed on: ${date}</p>
                                <p>Delivery: ${order.deliveryDate}</p>
                            </div>
                            <div style="text-align: right;">
                                <span class="status-badge status-${order.status.toLowerCase()}">${order.status}</span>
                                ${order.status !== 'Completed' && order.status !== 'Cancelled' ? 
                                    `<button onclick="cancelOrder('${order.id}')" style="display:block; margin-top:10px; color:#e74c3c; background:none; border:none; cursor:pointer; font-size:0.75rem; text-decoration:underline;">Cancel Order</button>` 
                                    : ''}
                            </div>
                        </div>
                    `;
                });
            });
        }

        window.cancelOrder = async (orderId) => {
            if (confirm("Are you sure you want to cancel this order?")) {
                try {
                    await set(ref(db, `orders/${orderId}/status`), 'Cancelled');
                    alert("Order cancelled successfully.");
                } catch (e) { alert(e.message); }
            }
        };

        logoutBtn.addEventListener('click', () => signOut(auth).then(() => window.location.href = "index.html"));
    </script>
</body>
</html>
